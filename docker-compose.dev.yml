version: "3.9"
# Layered on top of docker-compose.yml for local development.
# Enables hot reload for the backend (uvicorn --reload) and the
# Vite dev server for the frontend (HMR).
# Usage: make dev  (which runs: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d)

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    volumes:
      - ./backend:/app
    environment:
      LOG_LEVEL: DEBUG

  worker:
    command: >
      watchmedo auto-restart
        --directory=/app/app
        --pattern="*.py"
        --recursive
        -- celery -A app.workers.celery_app worker --loglevel=debug
          -Q dbt,spark,sql,kafka,default --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      LOG_LEVEL: DEBUG

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    command: npm run dev -- --host 0.0.0.0 --port 3000
